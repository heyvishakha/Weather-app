<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌦 Weather App</h1>

<div class="search-box">
  <input id="cityInput" placeholder="Enter city name" />
  <button onclick="getWeather()">🔍</button>
</div>

<div id="weatherResult">
  <div class="weather-card">
    <h2 id="city">Pune</h2>
    <h1 id="temp">25°C</h1>
    <p id="condition">☁️ Clouds</p>


    <div class="details">
      <div class="detail-card">
        <h4>💧 Humidity</h4>
        <p id="humidity">65%</p>
      </div>

      <div class="detail-card">
        <h4>🌬 Wind</h4>
        <p id="wind">12 km/h</p>
      </div>

      <div class="detail-card">
        <h4>🌡 Feels Like</h4>
        <p id="feelsLike">27°C</p>
      </div>

      <div class="detail-card">
        <h4>📈 Pressure</h4>
        <p id="pressure">1012 hPa</p>
      </div>
    </div>
  </div>
</div>
