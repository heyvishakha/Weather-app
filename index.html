<div id="weatherResult">
  <div class="weather-card">
    <h2 id="city">Pune</h2>
    <h1 id="temp">25°C</h1>
    <p id="condition">☁️ Clouds</p>


    <div class="details">
      <div class="detail-card">
        <h4>💧 Humidity</h4>
        <p id="humidity">65%</p>
      </div>

      <div class="detail-card">
        <h4>🌬 Wind</h4>
        <p id="wind">12 km/h</p>
      </div>

      <div class="detail-card">
        <h4>🌡 Feels Like</h4>
        <p id="feelsLike">27°C</p>
      </div>

      <div class="detail-card">
        <h4>📈 Pressure</h4>
        <p id="pressure">1012 hPa</p>
      </div>
    </div>
  </div>
